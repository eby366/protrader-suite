<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06080f">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ProTrader Suite — Crypto · Football IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — shared across all modules
═══════════════════════════════════════════════ */
:root{
  --bg:#06080f;--s1:#0b0f1a;--s2:#101622;--s3:#162030;--s4:#1c2a3e;
  --b1:#1e2e48;--b2:#253858;--b3:#2e4870;
  --cyan:#00d4ff;--cyanD:#0099bb;--cyanG:rgba(0,212,255,.12);
  --green:#00e676;--greenD:#00a855;--greenG:rgba(0,230,118,.1);
  --red:#ff3d5a;--redD:#cc1f38;--redG:rgba(255,61,90,.1);
  --gold:#ffbe00;--goldD:#cc8800;--goldG:rgba(255,190,0,.1);
  --purple:#b060ff;--purpleD:#8833dd;--purpleG:rgba(176,96,255,.1);
  --orange:#ff6a2e;--blue:#3d82ff;--pink:#ff44b8;
  --slate:#3e5472;--slate2:#8ca8c0;
  --text:#dceaf8;--text2:#607a94;
  --mono:'DM Mono',monospace;
  --ui:'Plus Jakarta Sans',sans-serif;
  --hd:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:var(--mono);font-size:12px}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,.006) 3px,rgba(0,212,255,.006) 4px);pointer-events:none;z-index:9999}

/* ═══════════════════════════════════════════════
   SHELL
═══════════════════════════════════════════════ */
.app{display:flex;flex-direction:column;height:100vh}

/* TOPBAR */
.tb{height:54px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0;z-index:300;position:relative}
.brand{font-family:var(--hd);font-size:16px;font-weight:800;white-space:nowrap;margin-right:20px;letter-spacing:-.5px}
.brand .c{color:var(--cyan)}.brand .f{color:var(--gold)}
.nav{display:flex;flex:1;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.ntab{height:54px;padding:0 13px;display:flex;align-items:center;gap:5px;font-family:var(--ui);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--slate2);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.ntab:hover{color:var(--text)}
.ntab.on{color:var(--cyan);border-bottom-color:var(--cyan)}
.ntab.foot-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.ntab.foot-tab:hover{color:var(--gold)}
.tb-r{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;border:1px solid var(--b2);background:var(--s2);font-size:8px;font-family:var(--ui);font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.pill.active-pill{border-color:var(--green);background:var(--greenG)}
.pill:hover{border-color:var(--cyan)}
.led{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.led-off{background:var(--slate)}
.led-on{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite}
.led-scan{background:var(--gold);box-shadow:0 0 8px var(--gold);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#clk{font-size:8px;color:var(--slate2);font-family:var(--mono)}

/* PAGES */
.content{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;display:none;overflow:hidden}
.page.on{display:block}
.scroll-p{overflow-y:auto;height:100%;padding:18px 22px}

/* ═══════════════════════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════════════════════ */
/* Sidebar */
.sb{overflow-y:auto;background:var(--s1);display:flex;flex-direction:column}
.sb-border-r{border-right:1px solid var(--b1)}
.sb-border-l{border-left:1px solid var(--b1)}
.sh{font-size:8px;font-family:var(--ui);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--slate);padding:9px 12px 6px;border-bottom:1px solid var(--b1);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}

/* Badges */
.badge{font-size:7px;padding:2px 6px;border-radius:2px;font-weight:700;letter-spacing:.5px;font-family:var(--ui);display:inline-block}
.b-buy{background:var(--greenG);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.b-sell{background:var(--redG);color:var(--red);border:1px solid rgba(255,61,90,.25)}
.b-hold{background:var(--goldG);color:var(--gold);border:1px solid rgba(255,190,0,.2)}
.b-h{background:var(--greenG);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.b-d{background:var(--goldG);color:var(--gold);border:1px solid rgba(255,190,0,.2)}
.b-a{background:var(--redG);color:var(--red);border:1px solid rgba(255,61,90,.25)}
.b-live{background:rgba(255,61,90,.12);color:var(--red);border:1px solid rgba(255,61,90,.3);animation:blink 1.5s infinite}
.b-value{background:var(--cyanG);color:var(--cyan);border:1px solid rgba(0,212,255,.25)}

/* Buttons */
.btn{border:none;padding:8px 12px;font-family:var(--ui);font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .2s;display:block;width:100%}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),var(--cyanD));color:var(--bg)}
.btn-cyan:hover{box-shadow:0 3px 18px var(--cyanG);transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,var(--green),var(--greenD));color:var(--bg)}
.btn-green:hover{box-shadow:0 3px 18px var(--greenG);transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--goldD));color:var(--bg)}
.btn-gold:hover{box-shadow:0 3px 18px var(--goldG);transform:translateY(-1px)}
.btn-red{background:var(--redG);border:1px solid rgba(255,61,90,.3);color:var(--red)}
.btn-ghost{background:transparent;border:1px solid var(--b2);color:var(--slate2)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-purple{background:linear-gradient(135deg,var(--purple),var(--purpleD));color:#fff}
.btn:active{transform:none!important;opacity:.85}

/* Form */
input,select{background:var(--s3);border:1px solid var(--b1);color:var(--text);padding:5px 8px;font-family:var(--mono);font-size:10px;border-radius:3px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus{border-color:var(--cyan)}
select option{background:var(--s2)}
.field{margin-bottom:8px}
.field label{display:block;font-size:8px;color:var(--slate2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}

/* Toggle */
.tgl{position:relative;width:32px;height:17px;cursor:pointer;flex-shrink:0}
.tgl input{display:none}
.tgl-t{position:absolute;inset:0;background:var(--b2);border-radius:9px;transition:background .2s}
.tgl input:checked~.tgl-t{background:var(--cyan)}
.tgl-th{position:absolute;width:11px;height:11px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
.tgl input:checked~.tgl-th{left:18px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.tgl-lbl{font-size:10px;font-family:var(--ui);font-weight:500}

/* KPI cards */
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:5px;padding:13px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-c::before{background:var(--cyan)}.kpi-g::before{background:var(--green)}.kpi-r::before{background:var(--red)}.kpi-y::before{background:var(--gold)}.kpi-p::before{background:var(--purple)}
.kpi-l{font-size:7px;font-family:var(--ui);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--slate);margin-bottom:4px}
.kpi-v{font-family:var(--hd);font-size:20px;font-weight:800;line-height:1}
.kpi-s{font-size:8px;color:var(--slate2);margin-top:2px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}

/* Chart card */
.chart-card{background:var(--s1);border:1px solid var(--b1);border-radius:5px;padding:14px;margin-bottom:14px}
.cc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cc-title{font-family:var(--ui);font-size:11px;font-weight:700}
.cc-tabs{display:flex;gap:3px}
.cct{padding:3px 8px;border-radius:2px;border:1px solid var(--b1);color:var(--slate2);font-size:8px;cursor:pointer;font-family:var(--mono);transition:all .12s}
.cct.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:700}
.cct:hover:not(.on){border-color:var(--cyan);color:var(--cyan)}
canvas{display:block;width:100%}

/* Log stream */
.log-stream{overflow-y:auto;flex:1;min-height:0}
.li{padding:6px 12px;border-bottom:1px solid var(--b1);display:flex;gap:6px;animation:sli .2s ease;flex-shrink:0}
@keyframes sli{from{opacity:0;transform:translateX(4px)}to{opacity:1;transform:none}}
.li-t{font-size:7px;color:var(--slate);white-space:nowrap;padding-top:1px;min-width:38px}
.li-b{flex:1;min-width:0}
.li-a{font-size:9px;font-weight:600;font-family:var(--ui);margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-s{font-size:8px;color:var(--slate2);line-height:1.4}

/* Score ring */
.score-ring{position:relative;display:flex;justify-content:center;margin-bottom:6px}
.score-ring svg{overflow:visible}
.score-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-38%);text-align:center}
.score-n{font-family:var(--hd);font-size:24px;font-weight:800;line-height:1}
.score-of{font-size:7px;color:var(--slate)}
.score-sig{font-family:var(--hd);font-size:13px;font-weight:800;letter-spacing:2px;text-align:center;margin-bottom:7px}
.score-pills{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.sp{background:var(--s2);border:1px solid var(--b1);border-radius:2px;padding:5px;text-align:center}
.sp-v{font-family:var(--hd);font-size:13px;font-weight:700}.sp-l{font-size:7px;color:var(--slate);text-transform:uppercase;letter-spacing:.5px}

/* Misc */
.up{color:var(--green)}.dn{color:var(--red)}
.spin{animation:ro 1s linear infinite;display:inline-block}
@keyframes ro{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}

/* ═══════════════════════════════════════════════
   DASHBOARD — Crypto
═══════════════════════════════════════════════ */
#pg-dash.on{display:grid;grid-template-columns:228px 1fr 264px;height:100%;overflow:hidden}

/* Coin items */
.ci{padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:7px;border-left:2px solid transparent;transition:all .12s}
.ci:hover{background:var(--s2)}.ci.on{background:var(--s2);border-left-color:var(--cyan)}
.ci-ic{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.ci-inf{flex:1;min-width:0}.ci-nm{font-family:var(--ui);font-size:11px;font-weight:600}
.ci-tk{font-size:8px;color:var(--slate2)}.ci-rt{text-align:right;flex-shrink:0}
.ci-px{font-size:10px;font-weight:600}.ci-chg{font-size:8px}

/* Wallet mini */
.wallet-box{padding:10px 12px;border-bottom:1px solid var(--b1)}
.wb-bal{font-family:var(--hd);font-size:22px;font-weight:800;color:var(--green)}
.wb-sub{font-size:8px;color:var(--slate2);margin-bottom:8px}
.wg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.wc{background:var(--s2);border:1px solid var(--b1);border-radius:3px;padding:5px 7px;text-align:center}
.wc-v{font-size:11px;font-weight:600}.wc-l{font-size:7px;color:var(--slate2);margin-top:1px;text-transform:uppercase;letter-spacing:.4px}

/* FG widget */
.fg-widget{padding:10px 12px;border-bottom:1px solid var(--b1)}
.fg-row{display:flex;align-items:center;gap:10px}
.fg-num{font-family:var(--hd);font-size:24px;font-weight:800}
.fg-lbl{font-size:8px;color:var(--slate2)}
.fg-bar{height:4px;background:var(--b1);border-radius:2px;margin-top:7px;overflow:hidden}
.fg-fill{height:100%;border-radius:2px;transition:width 1.5s ease}
.fg-labels{display:flex;justify-content:space-between;font-size:7px;color:var(--slate);margin-top:2px}

/* Center chart area */
.ctr{overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.ctr-hdr{padding:11px 18px 9px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;flex-shrink:0}
.pair-lbl{font-size:8px;font-family:var(--ui);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--slate);margin-bottom:2px}
.cur-px{font-family:var(--hd);font-size:26px;font-weight:800;line-height:1}
.px-meta{display:flex;gap:10px;margin-top:4px;font-size:8px;color:var(--slate)}
.tf-bar{display:flex;gap:3px}
.tf{background:transparent;border:1px solid var(--b1);color:var(--slate2);padding:3px 8px;font-family:var(--mono);font-size:8px;cursor:pointer;border-radius:2px;transition:all .12s}
.tf:hover{border-color:var(--cyan);color:var(--cyan)}.tf.on{background:var(--cyan);color:var(--bg);border-color:var(--cyan);font-weight:700}
.chart-wrap{margin:10px 18px 8px;background:var(--s1);border:1px solid var(--b1);border-radius:4px;overflow:hidden;position:relative;flex-shrink:0}
.chart-leg{position:absolute;top:7px;right:7px;background:rgba(6,8,15,.8);border:1px solid var(--b1);border-radius:3px;padding:5px 7px;font-size:7px}
.cl{display:flex;align-items:center;gap:4px;margin-bottom:2px}.cl:last-child{margin:0}
.cl-l{width:12px;height:2px;border-radius:1px}

/* 12 indicators */
.ind-zone{padding:0 18px 12px}
.iz-title{font-size:8px;font-family:var(--ui);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--slate);margin-bottom:7px}
.ind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ic{background:var(--s1);border:1px solid var(--b1);border-radius:4px;padding:9px;position:relative;overflow:hidden}
.ic::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.c-rsi::after{background:#b060ff}.c-macd::after{background:#00e676}.c-boll::after{background:#ffbe00}.c-ma::after{background:#00d4ff}
.c-ema::after{background:#a78bfa}.c-wr::after{background:#fb923c}.c-cci::after{background:#f472b6}.c-stoch::after{background:#2dd4bf}
.c-vwap::after{background:#60a5fa}.c-adx::after{background:#f9a8d4}.c-obv::after{background:#67e8f9}.c-fg::after{background:#ffbe00}
.icn{font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--slate);margin-bottom:4px;font-family:var(--ui);font-weight:600}
.icv{font-family:var(--hd);font-size:13px;font-weight:700;margin-bottom:1px;line-height:1.1}
.ics{font-size:7px;color:var(--slate2)}.ic-sig{position:absolute;top:7px;right:7px}
.ic-bar{height:2px;background:var(--b1);border-radius:1px;margin-top:6px;overflow:hidden}
.ic-fill{height:100%;border-radius:1px;transition:width 1.3s ease}

/* Robot DCA widget */
.rb-widget{padding:10px 12px;border-bottom:1px solid var(--b1)}
.rb-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.rb-f label{display:block;font-size:8px;color:var(--slate2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}

/* ═══════════════════════════════════════════════
   SPOT ROBOT
═══════════════════════════════════════════════ */
#pg-spot.on{display:grid;grid-template-columns:290px 1fr;height:100%;overflow:hidden}
.spot-cfg{overflow-y:auto;background:var(--s1);border-right:1px solid var(--b1);padding:14px}
.spot-main{overflow-y:auto;background:var(--bg);padding:16px}
.sc-t{font-family:var(--hd);font-size:15px;font-weight:800;margin-bottom:3px}
.sc-sub{font-size:9px;color:var(--slate2);margin-bottom:14px;line-height:1.5}
.cfg-sec{background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:12px;margin-bottom:10px}
.cfg-sec-t{font-size:8px;font-family:var(--ui);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--slate);margin-bottom:10px}
.tp-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px}
.tpc{background:var(--s1);border:2px solid var(--b1);border-radius:3px;padding:9px;cursor:pointer;transition:all .15s;text-align:center;position:relative}
.tpc.on{border-color:var(--cyan)}.tpc.on::after{content:'✓';position:absolute;top:3px;right:5px;font-size:8px;color:var(--cyan)}
.tpc-pct{font-family:var(--hd);font-size:17px;font-weight:800;color:var(--green)}.tpc-lbl{font-size:8px;color:var(--slate2);margin-top:1px}

/* Order cards */
.order-card{background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:12px;margin-bottom:8px;position:relative;overflow:hidden}
.oc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.oc-coin{font-family:var(--hd);font-size:15px;font-weight:700}
.oc-status{font-size:8px;font-family:var(--ui);font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:2px}
.oc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;text-align:center}
.oc-v{font-size:11px;font-weight:600}.oc-k{font-size:7px;color:var(--slate2);margin-top:1px;text-transform:uppercase;letter-spacing:.4px}
.tp-prog-lbl{display:flex;justify-content:space-between;font-size:8px;color:var(--slate2);margin-bottom:3px}
.tp-bar{height:5px;background:var(--b1);border-radius:3px;overflow:hidden}
.tp-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:3px;transition:width .5s ease}
.tp-targets{display:flex;gap:3px;flex-wrap:wrap;margin-top:7px}
.tpt{font-size:7px;padding:2px 6px;border-radius:2px;border:1px solid var(--b1);color:var(--slate2);font-family:var(--ui);font-weight:600;transition:all .15s}
.tpt.done{background:var(--greenG);border-color:rgba(0,230,118,.3);color:var(--green)}
.tpt.active{background:var(--cyanG);border-color:var(--cyan);color:var(--cyan)}

/* Cycle banner */
.cycle-banner{background:linear-gradient(135deg,var(--cyanG),var(--greenG));border:1px solid rgba(0,212,255,.2);border-radius:4px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.cb-icon{font-size:24px;flex-shrink:0}.cb-t{font-family:var(--hd);font-size:13px;font-weight:700;margin-bottom:2px}
.cb-s{font-size:9px;color:var(--slate2);line-height:1.4}

/* Spot KPI row */
.spot-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;text-align:center}
.skpi{background:var(--s1);border:1px solid var(--b1);border-radius:4px;padding:10px}
.skpi-v{font-family:var(--hd);font-size:17px;font-weight:700}.skpi-l{font-size:7px;color:var(--slate);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* Spot tx */
.spot-tx{background:var(--s1);border:1px solid var(--b1);border-radius:4px;overflow:hidden}
.stx-head,.stx-row{display:grid;grid-template-columns:70px 70px 60px 80px 80px 70px 1fr;gap:5px;padding:7px 12px;align-items:center}
.stx-head{font-size:7px;font-family:var(--ui);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--slate);border-bottom:1px solid var(--b1);background:var(--s2)}
.stx-row{font-size:9px;border-bottom:1px solid rgba(30,46,72,.5)}
.stx-row:last-child{border-bottom:none}.stx-row:hover{background:rgba(16,22,34,.8)}
